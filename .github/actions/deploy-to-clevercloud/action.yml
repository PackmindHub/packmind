name: 'Deploy to CleverCloud'
description: 'Deploy build artifacts to CleverCloud via Git'

inputs:
  artifact-name:
    description: 'Name of the artifact to download'
    required: true
  artifact-path:
    description: 'Path where the artifact should be downloaded'
    required: true
  source-path:
    description: 'Source path of the built files to deploy'
    required: true
  app-name:
    description: 'Name of the application (used for git clone directory)'
    required: true
  ssh-private-key:
    description: 'SSH private key for CleverCloud'
    required: true
  git-url:
    description: 'Git URL for CleverCloud deployment'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-path }}
    
