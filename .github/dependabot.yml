version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 15
    ignore:
      - dependency-name: "nx"
      - dependency-name: "@nx/*"
  - package-ecosystem: "docker"
    directory: "/dockerfile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
