name: Docker OSS Image Build

env:
  API_IMAGE_NAME: packmind/api-oss
  FRONTEND_IMAGE_NAME: packmind/frontend-oss
  MCP_IMAGE_NAME: packmind/mcp-oss
  # Public release image names
  PUBLIC_API_IMAGE_NAME: packmind/api
  PUBLIC_FRONTEND_IMAGE_NAME: packmind/frontend
  PUBLIC_MCP_IMAGE_NAME: packmind/mcp

on:
  workflow_call:
    inputs:
      api-artifact:
        required: true
        type: string
        description: 'API OSS build artifact name'
      frontend-artifact:
        required: true
        type: string
        description: 'Frontend OSS build artifact name'
      mcp-server-artifact:
        required: true
        type: string
        description: 'MCP Server OSS build artifact name'
      node-version:
        required: true
        type: string
        description: 'Node.js version to use'
    secrets:
      DOCKERHUB_USERNAME:
        required: true
        description: 'Docker Hub username'
      DOCKERHUB_TOKEN:
        required: true
        description: 'Docker Hub access token'
    outputs:
      api-image-tag:
        description: 'API OSS Docker image tag'
        value: ${{ jobs.build-api-image.outputs.image-tag }}
      frontend-image-tag:
        description: 'Frontend OSS Docker image tag'
        value: ${{ jobs.build-frontend-image.outputs.image-tag }}
      mcp-server-image-tag:
        description: 'MCP Server OSS Docker image tag'
        value: ${{ jobs.build-mcp-server-image.outputs.image-tag }}
      version:
        description: 'Package version used for Docker tags'
        value: ${{ jobs.build-api-image.outputs.version }}

jobs:
  build-api-image:
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/release/')
    outputs:
      image-tag: ${{ env.API_IMAGE_NAME }}:${{ steps.get-version.outputs.version }}
      version: ${{ steps.get-version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Get package version
        id: get-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Download API OSS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.api-artifact }}
          path: dist/apps/api/

      - name: Generate OSS tsconfig
        env:
          PACKMIND_EDITION: oss
        run: node scripts/select-tsconfig.mjs

      - name: Build migration bundle for Docker
        env:
          PACKMIND_EDITION: oss
        run: ./node_modules/.bin/nx bundle-docker migrations

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: false

      - name: Build API OSS Docker image (local for scanning)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f dockerfile/Dockerfile.api \
            -t ${{ env.API_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} \
            --load \
            .

      - name: Scan API OSS Docker image for vulnerabilities
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.API_IMAGE_NAME }}:${{ steps.get-version.outputs.version }}
          only-severities: critical,high
          exit-code: true

      - name: Build and push API OSS Docker image (amd64 only for main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          # Tag the already-built image with additional tags
          docker tag ${{ env.API_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} ${{ env.API_IMAGE_NAME }}:latest
          docker tag ${{ env.API_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          
          # Push all tags
          docker push ${{ env.API_IMAGE_NAME }}:${{ steps.get-version.outputs.version }}
          docker push ${{ env.API_IMAGE_NAME }}:latest
          docker push ${{ env.API_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push API OSS Docker image (multi-platform for release)
        if: startsWith(github.ref, 'refs/tags/release/')
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f dockerfile/Dockerfile.api \
            -t ${{ env.API_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} \
            -t ${{ env.API_IMAGE_NAME }}:latest \
            -t ${{ env.API_IMAGE_NAME }}:${{ github.sha }} \
            --push \
            .

      - name: Build and push public API image for release
        if: startsWith(github.ref, 'refs/tags/release/')
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f dockerfile/Dockerfile.api \
            -t ${{ env.PUBLIC_API_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} \
            -t ${{ env.PUBLIC_API_IMAGE_NAME }}:latest \
            --push \
            .



  build-frontend-image:
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/release/')
    outputs:
      image-tag: ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.get-version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Get package version
        id: get-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download Frontend OSS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.frontend-artifact }}
          path: apps/frontend/build/client/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: false

      - name: Build Frontend OSS Docker image (local for scanning)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f dockerfile/Dockerfile.frontend \
            -t ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} \
            --load \
            .

      - name: Scan Frontend OSS Docker image for vulnerabilities
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.get-version.outputs.version }}
          only-severities: critical,high
          exit-code: true

      - name: Build and push Frontend OSS Docker image (amd64 only for main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          # Tag the already-built image with additional tags
          docker tag ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} ${{ env.FRONTEND_IMAGE_NAME }}:latest
          docker tag ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          
          # Push all tags
          docker push ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.get-version.outputs.version }}
          docker push ${{ env.FRONTEND_IMAGE_NAME }}:latest
          docker push ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push Frontend OSS Docker image (multi-platform for release)
        if: startsWith(github.ref, 'refs/tags/release/')
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f dockerfile/Dockerfile.frontend \
            -t ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} \
            -t ${{ env.FRONTEND_IMAGE_NAME }}:latest \
            -t ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }} \
            --push \
            .

      - name: Build and push public Frontend image for release
        if: startsWith(github.ref, 'refs/tags/release/')
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f dockerfile/Dockerfile.frontend \
            -t ${{ env.PUBLIC_FRONTEND_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} \
            -t ${{ env.PUBLIC_FRONTEND_IMAGE_NAME }}:latest \
            --push \
            .



  build-mcp-server-image:
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/release/')
    outputs:
      image-tag: ${{ env.MCP_IMAGE_NAME }}:${{ steps.get-version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Get package version
        id: get-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download MCP Server OSS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.mcp-server-artifact }}
          path: dist/apps/mcp-server/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: false

      - name: Build MCP Server OSS Docker image (local for scanning)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f dockerfile/Dockerfile.mcp \
            -t ${{ env.MCP_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} \
            --load \
            .

      - name: Scan MCP Server OSS Docker image for vulnerabilities
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.MCP_IMAGE_NAME }}:${{ steps.get-version.outputs.version }}
          only-severities: critical,high
          exit-code: true

      - name: Build and push MCP Server OSS Docker image (amd64 only for main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          # Tag the already-built image with additional tags
          docker tag ${{ env.MCP_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} ${{ env.MCP_IMAGE_NAME }}:latest
          docker tag ${{ env.MCP_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} ${{ env.MCP_IMAGE_NAME }}:${{ github.sha }}
          
          # Push all tags
          docker push ${{ env.MCP_IMAGE_NAME }}:${{ steps.get-version.outputs.version }}
          docker push ${{ env.MCP_IMAGE_NAME }}:latest
          docker push ${{ env.MCP_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push MCP Server OSS Docker image (multi-platform for release)
        if: startsWith(github.ref, 'refs/tags/release/')
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f dockerfile/Dockerfile.mcp \
            -t ${{ env.MCP_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} \
            -t ${{ env.MCP_IMAGE_NAME }}:latest \
            -t ${{ env.MCP_IMAGE_NAME }}:${{ github.sha }} \
            --push \
            .

      - name: Build and push public MCP Server image for release
        if: startsWith(github.ref, 'refs/tags/release/')
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f dockerfile/Dockerfile.mcp \
            -t ${{ env.PUBLIC_MCP_IMAGE_NAME }}:${{ steps.get-version.outputs.version }} \
            -t ${{ env.PUBLIC_MCP_IMAGE_NAME }}:latest \
            --push \
            .
