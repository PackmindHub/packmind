name: Monthly Runtime Stack Upgrade Check

on:
  schedule:
    - cron: '0 6 1 * *' # First day of the month at 08:00 CET (06:00 UTC)
  workflow_dispatch:
    inputs:
      model:
        description: 'Claude model to use'
        required: false
        default: 'claude-opus-4-6'
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  runtime-stack-upgrade:
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Run Runtime Stack Upgrade Skill
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "/upgrade-runtime-stack"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(echo *)",
                  "Bash(git remote *)",
                  "Bash(mkdir *)",
                  "Bash(rg *)",
                  "Bash(grep *)",
                  "Agent",
                  "Read",
                  "Write",
                  "Glob",
                  "Grep",
                  "WebFetch",
                  "WebFetch(domain:raw.githubusercontent.com)",
                  "WebFetch(domain:nx.dev)",
                  "WebFetch(domain:github.com)"
                ]
              }
            }
          claude_args: "--model ${{ inputs.model || 'claude-opus-4-6' }} --max-turns 50"

      - name: Display report
        if: always()
        run: |
          if [ -f "upgrade-plan.md" ]; then
            echo "=== Runtime Stack Upgrade Plan ==="
            cat "upgrade-plan.md"
            echo "## Runtime Stack Upgrade Plan" >> "$GITHUB_STEP_SUMMARY"
            cat "upgrade-plan.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No upgrade-plan.md produced."
            echo "No upgrade-plan.md produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Detect upgrade status
        id: status
        if: always() && hashFiles('upgrade-plan.md') != ''
        run: |
          STATUS_LINE=$(head -n 1 upgrade-plan.md)
          if echo "$STATUS_LINE" | grep -q "upgrade-status: available"; then
            echo "status=available" >> "$GITHUB_OUTPUT"
          elif echo "$STATUS_LINE" | grep -q "upgrade-status: none"; then
            echo "status=none" >> "$GITHUB_OUTPUT"
          elif echo "$STATUS_LINE" | grep -q "upgrade-status: partial-fetch-failure"; then
            echo "status=partial-fetch-failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Slack payload
        if: always() && hashFiles('upgrade-plan.md') != ''
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="${{ steps.status.outputs.status }}"

          # Headline: status emoji + plain text.
          case "$STATUS" in
            available)              HEADLINE=":rocket: Runtime stack upgrades available" ;;
            none)                   HEADLINE=":white_check_mark: Runtime stack is up to date" ;;
            partial-fetch-failure)  HEADLINE=":warning: Runtime stack check ran with fetch failures" ;;
            *)                      HEADLINE=":grey_question: Runtime stack check produced an unrecognised status" ;;
          esac

          # Extract the Summary section (between "## Summary" and the next "## ").
          # Cap at 2500 chars to stay well below Slack's 3000-char per-block limit.
          SUMMARY=$(awk '/^## Summary$/{flag=1; next} /^## /{flag=0} flag' upgrade-plan.md)
          MAX_SUMMARY_LENGTH=2500
          if [ ${#SUMMARY} -gt $MAX_SUMMARY_LENGTH ]; then
            SUMMARY="${SUMMARY:0:$MAX_SUMMARY_LENGTH}..."
          fi

          ARTIFACT_LINK="$RUN_URL#artifacts"

          PAYLOAD=$(jq -n \
            --arg channel "${{ secrets.SLACK_CHANNEL_PACKMIND_SKILL_ID }}" \
            --arg headline "$HEADLINE" \
            --arg summary "$SUMMARY" \
            --arg run_url "$RUN_URL" \
            --arg artifact_url "$ARTIFACT_LINK" \
            '{
              channel: $channel,
              text: $headline,
              blocks: [
                { type: "header", text: { type: "plain_text", text: $headline } },
                { type: "section", text: { type: "mrkdwn", text: ($summary | if . == "" then "_(no Summary section found in upgrade-plan.md)_" else . end) } },
                { type: "context", elements: [
                    { type: "mrkdwn", text: ("<" + $run_url + "|View workflow run>  •  <" + $artifact_url + "|Download upgrade-plan.md>") }
                  ] }
              ]
            }')

          EOF_DELIMITER="SLACKEOF_$(openssl rand -hex 8)"
          echo "SLACK_PAYLOAD<<${EOF_DELIMITER}" >> "$GITHUB_ENV"
          echo "$PAYLOAD" >> "$GITHUB_ENV"
          echo "${EOF_DELIMITER}" >> "$GITHUB_ENV"

      - name: Send report to Slack
        if: always() && hashFiles('upgrade-plan.md') != ''
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_USER_OAUTH_ACCESS_TOKEN }}
          payload: ${{ env.SLACK_PAYLOAD }}
          errors: true

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-stack-upgrade-plan
          path: upgrade-plan.md
          if-no-files-found: warn
          retention-days: 90
