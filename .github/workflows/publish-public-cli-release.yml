name: Publish CLI Release to Public Repository

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: 'CLI version from the build'
      cli-executables-artifact:
        required: true
        type: string
        description: 'CLI executables artifact name'
    secrets:
      PUBLIC_REPO_TOKEN:
        required: true

env:
  NODE_VERSION: '22.17.0'

jobs:
  create-public-github-release:
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download CLI executables
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.cli-executables-artifact }}
          path: executables
      
      - name: Download signed macOS arm64 executable
        uses: actions/download-artifact@v4
        with:
          name: cli-macos-arm64-signed-${{ inputs.version }}
          path: executables-signed
      
      - name: Extract changelog for version
        id: extract-changelog
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CHANGELOG_FILE="apps/cli/CHANGELOG.MD"
          
          # Extract section for this version
          CHANGELOG_SECTION=$(awk -v ver="$VERSION" '
            /^# \[/ { 
              if (found) exit;
              if ($0 ~ "\\[" ver "\\]") found=1;
              next;
            }
            found { print }
          ' "$CHANGELOG_FILE")
          
          # Save to output with proper escaping
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Prepare release assets
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p release-assets
          
          # Rename and copy Linux x64
          if [ -f "executables/packmind-cli-linux-x64" ]; then
            cp "executables/packmind-cli-linux-x64" "release-assets/packmind-cli-linux-x64-${VERSION}"
            echo "✅ Prepared Linux x64 executable"
          else
            echo "❌ Error: Linux x64 executable not found"
            exit 1
          fi
          
          # Rename and copy Linux arm64
          if [ -f "executables/packmind-cli-linux-arm64" ]; then
            cp "executables/packmind-cli-linux-arm64" "release-assets/packmind-cli-linux-arm64-${VERSION}"
            echo "✅ Prepared Linux arm64 executable"
          else
            echo "❌ Error: Linux arm64 executable not found"
            exit 1
          fi
          
          # Rename and copy Windows x64
          if [ -f "executables/packmind-cli-windows-x64.exe" ]; then
            cp "executables/packmind-cli-windows-x64.exe" "release-assets/packmind-cli-windows-x64-${VERSION}.exe"
            echo "✅ Prepared Windows x64 executable"
          else
            echo "❌ Error: Windows x64 executable not found"
            exit 1
          fi
          
          # Copy signed macOS arm64 (already versioned) - must be signed
          if [ -f "executables-signed/packmind-cli-macos-arm64-${VERSION}" ]; then
            cp "executables-signed/packmind-cli-macos-arm64-${VERSION}" "release-assets/packmind-cli-macos-arm64-${VERSION}"
            echo "✅ Prepared signed macOS arm64 executable"
          else
            echo "❌ Error: Signed macOS arm64 executable not found"
            exit 1
          fi
          
          echo ""
          echo "📦 Release assets prepared:"
          ls -lh release-assets/
      
      - name: Create GitHub Release on Public Repository
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        with:
          repository: ${{ vars.PUBLIC_REPO_NAME }}
          tag_name: ${{ github.ref_name }}
          name: CLI ${{ inputs.version }}
          body: |
            ## Packmind CLI ${{ inputs.version }}
            
            ### Installation
            
            #### npm/npx
            ```bash
            npm install -g @packmind/cli@${{ inputs.version }}
            ```
            
            #### Standalone Executables
            Download the appropriate executable for your platform:
            - **Linux x64**: `packmind-cli-linux-x64-${{ inputs.version }}`
            - **Linux arm64**: `packmind-cli-linux-arm64-${{ inputs.version }}`
            - **macOS arm64**: `packmind-cli-macos-arm64-${{ inputs.version }}`
            - **Windows x64**: `packmind-cli-windows-x64-${{ inputs.version }}.exe`
            
            Make the executable runnable (Linux/macOS):
            ```bash
            chmod +x packmind-cli-*-${{ inputs.version }}
            ```
            
            ### Changes
            ${{ steps.extract-changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            release-assets/packmind-cli-linux-x64-${{ inputs.version }}
            release-assets/packmind-cli-linux-arm64-${{ inputs.version }}
            release-assets/packmind-cli-macos-arm64-${{ inputs.version }}
            release-assets/packmind-cli-windows-x64-${{ inputs.version }}.exe
      
      - name: Summary
        env:
          VERSION: ${{ inputs.version }}
          PUBLIC_REPO: ${{ vars.PUBLIC_REPO_NAME }}
          REF: ${{ github.ref_name }}
        run: |
          echo "## Public GitHub Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully created GitHub release on ${PUBLIC_REPO}: CLI ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Assets" >> $GITHUB_STEP_SUMMARY
          echo "- packmind-cli-linux-x64-${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- packmind-cli-linux-arm64-${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- packmind-cli-macos-arm64-${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- packmind-cli-windows-x64-${VERSION}.exe" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Release](https://github.com/${PUBLIC_REPO}/releases/tag/${REF})" >> $GITHUB_STEP_SUMMARY

