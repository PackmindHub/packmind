name: Quality and Security Checks

env:
  ENTERPRISE_EDITION: proprietary
  OSS_EDITION: oss
  HUSKY: '0'

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
        description: 'Node.js version to use'
      cli-executables-artifact:
        required: true
        type: string
        description: 'CLI executables artifact name from build-proprietary'
    secrets:
      GITGUARDIAN_API_KEY:
        required: true
        description: 'API key for GitGuardian security scanning'
      SONAR_TOKEN:
        required: true
        description: 'Token for SonarCloud code quality analysis'
      PACKMIND_API_KEY_V3:
        required: false
        description: 'API key to run new packmind-cli'

jobs:
  gitguardian-scan:
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    timeout-minutes: ${{ github.actor == 'dependabot[bot]' && 15 || 30 }}
    name: GitGuardian scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: GitGuardian scan
        uses: GitGuardian/ggshield/actions/secret@v1.41.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  lint-and-format:
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    timeout-minutes: ${{ github.actor == 'dependabot[bot]' && 15 || 30 }}
    strategy:
      matrix:
        node-version: ["${{ inputs.node-version }}"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Generate Proprietary tsconfig
        env:
          PACKMIND_EDITION: ${{ env.ENTERPRISE_EDITION }}
        run: node scripts/select-tsconfig.mjs
      - name: Lint code (Proprietary)
        env:
          PACKMIND_EDITION: ${{ env.ENTERPRISE_EDITION }}
        run: ./node_modules/.bin/nx run-many -t lint --tuiAutoExit
      - name: Check code formatting
        run: npm run prettier:check

  sonarqube:
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    timeout-minutes: ${{ github.actor == 'dependabot[bot]' && 15 || 30 }}
    strategy:
      matrix:
        node-version: ["${{ inputs.node-version }}"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Generate Proprietary tsconfig
        env:
          PACKMIND_EDITION: ${{ env.ENTERPRISE_EDITION }}
        run: node scripts/select-tsconfig.mjs
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  packmind-cli:
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    timeout-minutes: ${{ github.actor == 'dependabot[bot]' && 15 || 30 }}
    name: Run Packmind CLI

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CLI executable
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.cli-executables-artifact }}
          path: ./cli-binary

      - name: Make binary executable
        run: chmod +x ./cli-binary/packmind-cli-linux-x64

      - name: Run Packmind CLI V3
        run: ./cli-binary/packmind-cli-linux-x64 lint .
        env:
          PACKMIND_API_KEY_V3: ${{ secrets.PACKMIND_API_KEY_V3 }}

  check-cli-sync:
    if: vars.PACKMIND_EDITION == 'proprietary'
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    timeout-minutes: ${{ github.actor == 'dependabot[bot]' && 15 || 30 }}
    name: Check CLI source parity with OSS

    steps:
      - name: Checkout proprietary repo
        uses: actions/checkout@v4

      - name: Clone OSS repo (shallow)
        run: git clone --depth 1 --branch main https://github.com/PackmindHub/Packmind.git /tmp/packmind-oss

      - name: Compare apps/cli/src directories
        run: |
          PROPRIETARY_COUNT=$(find apps/cli/src -type f | wc -l | tr -d ' ')
          OSS_COUNT=$(find /tmp/packmind-oss/apps/cli/src -type f | wc -l | tr -d ' ')
          echo "Proprietary: ${PROPRIETARY_COUNT} files | OSS: ${OSS_COUNT} files"

          if [ "$PROPRIETARY_COUNT" -eq 0 ] || [ "$OSS_COUNT" -eq 0 ]; then
            echo "::error::One of the directories is empty or missing. Aborting comparison."
            exit 1
          fi

          echo ""
          echo "=== File presence differences ==="
          diff -rq apps/cli/src /tmp/packmind-oss/apps/cli/src || FILE_DIFF=1

          echo ""
          echo "=== Content differences ==="
          diff -r apps/cli/src /tmp/packmind-oss/apps/cli/src || CONTENT_DIFF=1

          if [ "${FILE_DIFF:-0}" = "1" ] || [ "${CONTENT_DIFF:-0}" = "1" ]; then
            echo ""
            echo "::error::CLI source code (apps/cli/src) has diverged from the OSS repo (PackmindHub/Packmind). Please sync the changes."
            exit 1
          fi

          echo "CLI source code is in sync with OSS."
