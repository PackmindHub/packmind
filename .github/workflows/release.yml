name: Create Release

on:
  workflow_call:

jobs:
  create-release:
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get package version
        id: get-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Set image name and version suffix
        id: set-image-naming
        run: |
          # OSS and Proprietary repos are merged. Release produces both tag variants:
          #   - OSS: unsuffixed (packmind/api:VERSION)
          #   - Proprietary/Enterprise: -enterprise suffix (packmind/api:VERSION-enterprise)
          echo "name_suffix=" >> $GITHUB_OUTPUT
          echo "version_tag_oss=${{ steps.get-version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "version_tag_proprietary=${{ steps.get-version.outputs.version }}-enterprise" >> $GITHUB_OUTPUT

      - name: Extract changelog for version
        id: extract-changelog
        env:
          VERSION: ${{ steps.get-version.outputs.version }}
        run: |
          CHANGELOG_FILE="CHANGELOG.MD"

          # Extract section for this version
          CHANGELOG_SECTION=$(awk -v ver="$VERSION" '
            /^# \[/ {
              if (found) exit;
              if ($0 ~ "\\[" ver "\\]") found=1;
              next;
            }
            found { print }
          ' "$CHANGELOG_FILE")

          # Save to output with proper escaping
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release v${{ steps.get-version.outputs.version }}
          body: |
            ## Changes
            ${{ steps.extract-changelog.outputs.changelog }}

            ## Docker Images

            The following Docker images have been built and pushed to Docker Hub:

            ### OSS
            - `packmind/api:${{ steps.set-image-naming.outputs.version_tag_oss }}`
            - `packmind/frontend:${{ steps.set-image-naming.outputs.version_tag_oss }}`
            - `packmind/mcp:${{ steps.set-image-naming.outputs.version_tag_oss }}`

            ### Proprietary (Enterprise)
            - `packmind/api:${{ steps.set-image-naming.outputs.version_tag_proprietary }}`
            - `packmind/frontend:${{ steps.set-image-naming.outputs.version_tag_proprietary }}`
            - `packmind/mcp:${{ steps.set-image-naming.outputs.version_tag_proprietary }}`

            All images are also available with the `latest` tag (OSS) and `latest-enterprise` tag (Proprietary).
          draft: false
          prerelease: false
