name: TEST — Update Packmind Artifacts (sandbox)

# Manual trigger only. Never runs automatically.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ${{ vars.ACTION_RUNNER_TAG || 'self-hosted' }}
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run update-packmind-artifacts action
        id: action
        uses: PackmindHub/update-packmind-artifacts@v1.0.0
        with:
          packmind-api-key: ${{ secrets.PACKMIND_API_KEY_V3 }}

      - name: Show outputs
        run: |
          echo "changed   = ${{ steps.action.outputs.changed }}"
          echo "pr-url    = ${{ steps.action.outputs.pr-url }}"
          echo "pr-number = ${{ steps.action.outputs.pr-number }}"
