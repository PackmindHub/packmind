name: "TMP: CLI lint on windows"

env:
  HUSKY: '0'

on:
  push:
    branches:
      - cli-lint-windows

jobs:
  cli-lint-windows:
    runs-on: depot-windows-2025-4
    timeout-minutes: 30
    name: CLI lint on Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Use Node.js 24.15.0
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build CLI
        run: pnpm packmind-cli:build

      - name: Install dist CLI runtime dependencies
        shell: bash
        run: sh scripts/install-dist-cli-deps.sh

      - name: Run CLI lint
        run: node dist/apps/cli/main.cjs lint .
        env:
          PACKMIND_API_KEY_V3: ${{ secrets.PACKMIND_API_KEY_V3 }}
