name: Weekly CLI Version Report

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC (9 AM UTC)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-version-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Generate CLI version report
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
        run: |
          node scripts/datadog-cli-version-report.mjs | tee cli-version-report.txt

      - name: Publish report to step summary
        if: always() && hashFiles('cli-version-report.txt') != ''
        run: |
          {
            echo "## Packmind CLI Version Usage (last 7 days)"
            echo ''
            echo '```'
            cat cli-version-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cli-version-report
          path: cli-version-report.txt
          if-no-files-found: warn
          retention-days: 90
