name: Weekly Documentation Audit

on:
  schedule:
    - cron: '0 7 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch:
    inputs:
      model:
        description: 'Claude model to use'
        required: false
        default: 'claude-sonnet-4-6'
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  doc-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Run Documentation Audit
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "/doc-audit"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(echo *)",
                  "Bash(git remote *)",
                  "Bash(mkdir *)",
                  "Agent",
                  "Read",
                  "Write",
                  "Glob",
                  "Grep"
                ]
              }
            }
          claude_args: "--model ${{ inputs.model || 'claude-opus-4-6' }} --max-turns 50"

      - name: Display reports
        if: always()
        run: |
          if [ -f "doc-audit-report.md" ]; then
            echo "=== Documentation Audit Report ==="
            cat "doc-audit-report.md"
            echo "## Documentation Audit Report" >> "$GITHUB_STEP_SUMMARY"
            cat "doc-audit-report.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No report file found."
            echo "No report file found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doc-audit-report
          path: doc-audit-report.md
          if-no-files-found: warn
          retention-days: 30

      - name: Read report content
        id: read-report
        if: always() && hashFiles('doc-audit-report.md') != ''
        run: |
          REPORT=$(cat doc-audit-report.md)
          # Truncate if too long for Slack (limit ~3000 chars to stay safe)
          if [ ${#REPORT} -gt 3000 ]; then
            REPORT="${REPORT:0:3000}... _(truncated, see full report in GitHub Actions)_"
          fi
          {
            echo "report<<EOF"
            echo "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send report to Slack
        if: always() && steps.read-report.outputs.report != ''
        uses: archive/github-actions-slack@v2.10.1
        with:
          slack-bot-user-oauth-access-token: ${{ secrets.SLACK_BOT_USER_OAUTH_ACCESS_TOKEN }}
          slack-channel: ${{ secrets.SLACK_DOC_AUDIT_CHANNEL_ID }}
          slack-text: |
            📝 *Weekly Documentation Audit Report*
            _Run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>_

            ${{ steps.read-report.outputs.report }}
